<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Favourites</title>

  <link href="../assets/css/material-kit.css?v=3.0.0" rel="stylesheet" />
  <link rel="stylesheet" href="../app.css">

  <style>
    .youtube-grid {
      column-width: 320px;
      column-gap: 1.5rem;
      margin-top: 2rem;
    }

    .yt-lite {
      display: inline-block;
      width: 100%;
      aspect-ratio: 16/9;
      background-size: cover;
      background-position: center;
      margin-bottom: 1.5rem;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .yt-lite::after {
      content: "▶";
      font-size: 3rem;
      color: white;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.9;
    }

    .yt-lite iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body class="bg-gray-200">

<div class="container py-5">
  <h2 class="text-center">YouTube Favourites</h2>

  <div class="youtube-grid">

    <!-- VIDEO BLOCK -->
    <div class="yt-lite" data-id="dQw4w9WgXcQ"></div>
    <div class="yt-lite" data-id="3GwjfUFyY6M"></div>
    <div class="yt-lite" data-id="kxopViU98Xo"></div>

    <!-- ADD MORE LIKE THIS -->

  </div>
</div>

<script>
  document.querySelectorAll(".yt-lite").forEach(el => {
    const id = el.dataset.id;
    el.style.backgroundImage = `url(https://img.youtube.com/vi/${id}/hqdefault.jpg)`;

    el.addEventListener("click", () => {
      el.innerHTML = `
        <iframe 
          src="https://www.youtube.com/embed/${id}?autoplay=1" 
          allowfullscreen>
        </iframe>
      `;
    });
  });
</script>

</body>
</html>
